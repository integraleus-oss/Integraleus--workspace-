<!-- Баргаф вертикальный / Vertical Bargraph -->
<!-- Category: widgets | Tags: HP-HMI, визуализация -->
<!-- Color param: replace #3d5a7a with state color -->
<!-- stopped=#3d5a7a running=#22d3a0 disabled=#2a3a5e alarm=#ff4454 -->
<svg viewBox="0 0 40 100" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="5" width="24" height="80" fill="none" stroke="#3d5a7a" stroke-width="1.5" rx="2"/><rect x="10" y="45" width="20" height="38" fill="#3d5a7a" opacity="0.5" rx="1"/><line x1="6" y1="25" x2="8" y2="25" stroke="#ff4454" stroke-width="1.5"/><line x1="6" y1="65" x2="8" y2="65" stroke="#fbbf24" stroke-width="1.5"/><text x="20" y="96" text-anchor="middle" font-size="8" font-family="Arial" fill="#3d5a7a">45%</text></svg>
