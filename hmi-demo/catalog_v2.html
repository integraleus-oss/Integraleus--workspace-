<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP-HMI SVG Symbol Library — Oil &amp; Gas / Chemical</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Oswald:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #080c14;
    --bg1: #0d1524;
    --bg2: #111e35;
    --surface: #0f1d30;
    --border: #1a2e4a;
    --border-hi: #234060;
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.12);
    --orange: #f97316;
    --green: #22d3a0;
    --red: #ff4454;
    --yellow: #fbbf24;
    --text: #d8e8f8;
    --text2: #7a9bc0;
    --text3: #3d5a7a;
    --font-mono: 'JetBrains Mono', monospace;
    --font-ui: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
    --r: 3px;
    --r2: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    font-size: 15px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(26,46,74,0.15) 48px),
      repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(26,46,74,0.15) 48px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 48px 48px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 48px;
    width: 180px;
    height: 1px;
    background: var(--cyan);
  }
  header h1 {
    font-family: var(--font-ui);
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
  }
  header h1 span { color: var(--cyan); }
  header p {
    color: var(--text2);
    font-size: 14px;
    font-family: var(--font-body);
    max-width: 700px;
  }

  .legend {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text3);
  }
  .legend-swatch {
    width: 20px;
    height: 20px;
    border-radius: var(--r);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .controls-bar {
    position: relative;
    z-index: 10;
    padding: 14px 48px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    flex-wrap: wrap;
  }
  .controls-bar label {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text3);
  }

  .state-btn {
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--r);
    transition: all 0.15s;
  }
  .state-btn:hover { border-color: var(--border-hi); color: var(--text); }
  .state-btn.active { background: var(--cyan-dim); color: var(--cyan); border-color: var(--cyan); }

  .filter-btns {
    margin-left: auto;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    max-width: 720px;
    justify-content: flex-end;
  }
  .filter-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: var(--r);
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--border-hi); color: var(--text); }
  .filter-btn.active { background: var(--cyan-dim); color: var(--cyan); border-color: var(--cyan); }

  main { position: relative; z-index: 1; padding: 32px 48px; }

  .category { margin-bottom: 40px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .category-header::before {
    content: '';
    display: block;
    width: 4px;
    height: 22px;
    background: var(--cyan);
    flex-shrink: 0;
  }
  .category-header h2 {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text2);
  }
  .category-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg2);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .symbols-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }

  .symbol-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .symbol-card::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), transparent);
  }
  .symbol-card:hover {
    border-color: var(--border-hi);
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .symbol-preview {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg1);
    padding: 12px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .symbol-preview::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(26,46,74,0.08) 20px),
      repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(26,46,74,0.08) 20px);
    pointer-events: none;
  }
  .symbol-preview svg {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
  }

  .symbol-name {
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text);
    padding: 10px 12px 2px;
  }
  .symbol-name-en {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    padding: 0 12px 6px;
  }
  .symbol-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    padding: 0 12px 10px;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 6px;
    background: var(--bg2);
    color: var(--text3);
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  .copy-indicator {
    position: absolute;
    top: 14px;
    right: 8px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--cyan);
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 2;
  }
  .symbol-card:hover .copy-indicator { opacity: 1; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 28px;
    max-width: 600px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal h3 {
    font-family: var(--font-ui);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 16px;
  }
  .modal-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 150px;
    margin-bottom: 20px;
    position: relative;
  }
  .modal-preview::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(26,46,74,0.08) 20px),
      repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(26,46,74,0.08) 20px);
    pointer-events: none;
    border-radius: var(--r2);
  }
  .modal-preview svg { max-width: 200px; max-height: 140px; position: relative; z-index: 1; }
  .modal-states { display: flex; gap: 8px; margin-bottom: 20px; }
  .modal-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--cyan);
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .modal-actions { display: flex; gap: 8px; }
  .btn {
    padding: 8px 18px;
    border-radius: var(--r);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }
  .btn-primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
  .btn-primary:hover { background: #33ddff; transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--text2); }
  .btn-secondary:hover { color: var(--text); border-color: var(--border-hi); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--cyan);
    color: var(--bg);
    padding: 10px 20px;
    border-radius: var(--r2);
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.visible { opacity: 1; transform: translateY(0); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  .category { animation: fadeUp .4s ease both; }

  @media (max-width: 768px) {
    header, main, .controls-bar { padding-left: 20px; padding-right: 20px; }
    .symbols-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <h1>HP-HMI <span>SYMBOLS</span></h1>
  <p>Библиотека SVG-символов для мнемосхем высокоэффективного HMI. Стандарт ISA-101 / HP-HMI. Нефтегазовое и химическое производство.</p>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-top:12px;line-height:2">v2.0.0 · 2026 · ISA-101 / HP-HMI · Dark Industrial Theme</div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#3d5a7a"></div>Stopped / Closed</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#22d3a0"></div>Running / Open</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#2a3a5e"></div>Disabled / No FB</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#ff4454"></div>Alarm Critical</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fbbf24"></div>Alarm High</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#00d4ff"></div>Alarm Low</div>
  </div>
</header>

<div class="controls-bar">
  <label>Состояние:</label>
  <button class="state-btn active" data-state="stopped" onclick="setState('stopped')">Стоп</button>
  <button class="state-btn" data-state="running" onclick="setState('running')">Работа</button>
  <button class="state-btn" data-state="disabled" onclick="setState('disabled')">Откл.</button>
  <button class="state-btn" data-state="alarm" onclick="setState('alarm')">Авария</button>

  <div class="filter-btns">
    <button class="filter-btn active" data-cat="all" onclick="filterCat('all')">Все</button>
    <button class="filter-btn" data-cat="pumps" onclick="filterCat('pumps')">Насосы</button>
    <button class="filter-btn" data-cat="compressors" onclick="filterCat('compressors')">Компрессоры</button>
    <button class="filter-btn" data-cat="valves" onclick="filterCat('valves')">Клапаны</button>
    <button class="filter-btn" data-cat="vessels" onclick="filterCat('vessels')">Ёмкости</button>
    <button class="filter-btn" data-cat="hx" onclick="filterCat('hx')">Теплообменники</button>
    <button class="filter-btn" data-cat="sensors" onclick="filterCat('sensors')">Датчики</button>
    <button class="filter-btn" data-cat="fans" onclick="filterCat('fans')">Вентиляторы</button>
    <button class="filter-btn" data-cat="motors" onclick="filterCat('motors')">Двигатели</button>
    <button class="filter-btn" data-cat="piping" onclick="filterCat('piping')">Трубопроводы</button>
    <button class="filter-btn" data-cat="electrical" onclick="filterCat('electrical')">Электро</button>
    <button class="filter-btn" data-cat="widgets" onclick="filterCat('widgets')">Виджеты HMI</button>
    <button class="filter-btn" data-cat="fittings" onclick="filterCat('fittings')">Арматура</button>
    <button class="filter-btn" data-cat="auxiliary" onclick="filterCat('auxiliary')">Вспомогат.</button>
    <button class="filter-btn" data-cat="sis" onclick="filterCat('sis')">SIS/ESD</button>

  </div>
</div>

<main id="main"></main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle"></h3>
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-states">
      <button class="state-btn active" onclick="setModalState('stopped')">Стоп</button>
      <button class="state-btn" onclick="setModalState('running')">Работа</button>
      <button class="state-btn" onclick="setModalState('disabled')">Откл.</button>
      <button class="state-btn" onclick="setModalState('alarm')">Авария</button>
    </div>
    <div class="modal-code" id="modalCode"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="copySvg()">Копировать SVG</button>
      <button class="btn btn-secondary" onclick="downloadSvg()">Скачать .svg</button>
      <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = {
  stopped: '#3d5a7a',
  running: '#22d3a0',
  disabled: '#2a3a5e',
  alarm: '#ff4454'
};

let currentState = 'stopped';
let currentFilter = 'all';
let modalSymbol = null;
let modalState = 'stopped';

const symbols = [
  // ── PUMPS ──
  {
    id: 'centrifugal-pump', cat: 'pumps', name: 'Центробежный насос', nameEn: 'Centrifugal Pump',
    tags: ['P&ID','ISA'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="30" r="18" fill="none" stroke="${c}" stroke-width="2"/>
      <polygon points="58,30 70,22 70,38" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="10" y1="30" x2="22" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="70" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
    </svg>`
  },
  {
    id: 'positive-displacement-pump', cat: 'pumps', name: 'Поршневой насос', nameEn: 'Positive Displacement Pump',
    tags: ['P&ID','ISA'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="30" r="18" fill="none" stroke="${c}" stroke-width="2"/>
      <polygon points="58,30 70,22 70,38" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="10" y1="30" x2="22" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="70" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="32" y1="16" x2="48" y2="44" stroke="${c}" stroke-width="1.5"/>
    </svg>`
  },
  {
    id: 'submersible-pump', cat: 'pumps', name: 'Погружной насос', nameEn: 'Submersible Pump',
    tags: ['P&ID'],
    svg: (c) => `<svg viewBox="0 0 80 70" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="35" r="18" fill="none" stroke="${c}" stroke-width="2"/>
      <polygon points="58,35 70,27 70,43" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="40" y1="17" x2="40" y2="5" stroke="${c}" stroke-width="2"/>
      <line x1="70" y1="35" x2="80" y2="35" stroke="${c}" stroke-width="2"/>
      <line x1="28" y1="60" x2="52" y2="60" stroke="${c}" stroke-width="1.5"/>
      <line x1="32" y1="64" x2="48" y2="64" stroke="${c}" stroke-width="1.5"/>
    </svg>`
  },
  {
    id: 'vacuum-pump', cat: 'pumps', name: 'Вакуумный насос', nameEn: 'Vacuum Pump',
    tags: ['P&ID'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="30" r="18" fill="none" stroke="${c}" stroke-width="2"/>
      <polygon points="58,30 70,22 70,38" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="10" y1="30" x2="22" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="70" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
      <text x="40" y="34" text-anchor="middle" font-size="10" font-family="Arial" fill="${c}">V</text>
    </svg>`
  },
  // ── COMPRESSORS ──
  {
    id: 'centrifugal-compressor', cat: 'compressors', name: 'Центробежный компрессор', nameEn: 'Centrifugal Compressor',
    tags: ['P&ID','ISA'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <polygon points="15,50 65,50 55,10 25,10" fill="none" stroke="${c}" stroke-width="2"/>
      <circle cx="40" cy="30" r="8" fill="none" stroke="${c}" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="15" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="65" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
    </svg>`
  },
  {
    id: 'reciprocating-compressor', cat: 'compressors', name: 'Поршневой компрессор', nameEn: 'Reciprocating Compressor',
    tags: ['P&ID'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <rect x="15" y="10" width="50" height="40" fill="none" stroke="${c}" stroke-width="2" rx="2"/>
      <line x1="40" y1="10" x2="40" y2="50" stroke="${c}" stroke-width="1.5" stroke-dasharray="4,3"/>
      <line x1="0" y1="30" x2="15" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="65" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
      <polygon points="35,25 45,25 40,35" fill="${c}"/>
    </svg>`
  },
  {
    id: 'screw-compressor', cat: 'compressors', name: 'Винтовой компрессор', nameEn: 'Screw Compressor',
    tags: ['P&ID'],
    svg: (c) => `<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
      <polygon points="15,50 65,50 55,10 25,10" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="30" y1="18" x2="30" y2="45" stroke="${c}" stroke-width="1.5"/>
      <line x1="50" y1="14" x2="50" y2="45" stroke="${c}" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="15" y2="30" stroke="${c}" stroke-width="2"/>
      <line x1="65" y1="30" x2="80" y2="30" stroke="${c}" stroke-width="2"/>
    </svg>`
  },
  // ── VALVES ──
  {
    id: 'gate-valve', cat: 'valves', name: 'Задвижка', nameEn: 'Gate Valve',
    tags: ['P&ID','ISA'],
    svg: (c) => `<svg viewBox="0 0 60 50" xmlns="http://www.w3.org/2000/svg">
      <polygon points="5,40 30,25 5,10" fill="none" stroke="${c}" stroke-width="2"/>
      <polygon points="55,40 30,25 55,10" fill="none" stroke="${c}" stroke-width="2"/>
      <line x1="30" y1="25" x2="30" y2="5" stroke="${c}" stroke-width="2"/>
      <line x1="22" y1="5" x2="38" y2="5" stroke="${c}" stroke-width="2"/>
      <line x1="0" y1="25" x2="5" y2="25" stroke="${c}" stroke-width="2"/>

const catNames = {
  pumps: 'Насосы',
  compressors: 'Компрессоры',
  valves: 'Клапаны',
  vessels: 'Ёмкости и резервуары',
  hx: 'Теплообменники и котлы',
  sensors: 'Датчики и приборы КИПиА',
  fans: 'Вентиляторы и воздухообмен',
  motors: 'Двигатели и приводы',
  piping: 'Трубопроводы и соединения',
  electrical: 'Электрооборудование',
  widgets: 'Элементы визуализации HP-HMI',
  fittings: 'Трубопроводная арматура',
  auxiliary: 'Вспомогательное оборудование',
  sis: 'Системы безопасности SIS / ESD'
};

function render() {
  const main = document.getElementById('main');
  const cats = currentFilter === 'all' ? ['pumps','compressors','valves','vessels','hx','sensors','fans','motors','piping','electrical','widgets','fittings','auxiliary','sis'] : [currentFilter];
  let html = '';
  cats.forEach(cat => {
    const items = symbols.filter(s => s.cat === cat);
    html += `<div class="category" data-cat="${cat}">
      <div class="category-header">
        <h2>${catNames[cat]}</h2>
        <span class="category-count">${items.length}</span>
      </div>
      <div class="symbols-grid">`;
    items.forEach(s => {
      html += `<div class="symbol-card" onclick="openModal('${s.id}')">
        <span class="copy-indicator">click → SVG</span>
        <div class="symbol-preview">${s.svg(COLORS[currentState])}</div>
        <div class="symbol-name">${s.name}</div>
        <div class="symbol-name-en">${s.nameEn}</div>
        <div class="symbol-tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  main.innerHTML = html;
}

function setState(state) {
  currentState = state;
  document.querySelectorAll('.controls-bar .state-btn').forEach(b => b.classList.toggle('active', b.dataset.state === state));
  render();
}

function filterCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

function openModal(id) {
  const s = symbols.find(x => x.id === id);
  if (!s) return;
  modalSymbol = s;
  modalState = currentState;
  renderModal();
  document.getElementById('modalOverlay').classList.add('visible');
}

function renderModal() {
  if (!modalSymbol) return;
  const c = COLORS[modalState];
  document.getElementById('modalTitle').textContent = `${modalSymbol.name} — ${modalSymbol.nameEn}`;
  document.getElementById('modalPreview').innerHTML = modalSymbol.svg(c);
  const svgCode = modalSymbol.svg(c).trim();
  document.getElementById('modalCode').textContent = svgCode;
  document.querySelectorAll('.modal-states .state-btn').forEach((b, i) => {
    const states = ['stopped','running','disabled','alarm'];
    b.classList.toggle('active', states[i] === modalState);
  });
}

function setModalState(state) {
  modalState = state;
  renderModal();
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('visible');
}

function copySvg() {
  if (!modalSymbol) return;
  const svg = modalSymbol.svg(COLORS[modalState]).trim();
  navigator.clipboard.writeText(svg).then(() => showToast('SVG скопирован в буфер'));
}

function downloadSvg() {
  if (!modalSymbol) return;
  const svg = modalSymbol.svg(COLORS[modalState]).trim();
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${modalSymbol.id}-${modalState}.svg`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${modalSymbol.id}-${modalState}.svg загружен`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  setTimeout(() => t.classList.remove('visible'), 2000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
