<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP-HMI SVG Library — Промышленная библиотека символов</title>
<style>
:root {
  --bg: #1e1e2e;
  --panel: #262640;
  --card: #2a2a48;
  --border: #3a3a5e;
  --accent: #5b9bd5;
  --text: #d4d4e8;
  --dim: #7a7a9e;
  --hmi-bg: #808080;
  --hmi-equipment: #b0b0b0;
  --hmi-pipe: #999999;
  --hmi-running: #00b050;
  --hmi-stopped: #999999;
  --hmi-fault: #ff3333;
  --hmi-alarm-h: #ffcc00;
  --hmi-alarm-hh: #ff3333;
  --hmi-alarm-l: #ffcc00;
  --hmi-alarm-ll: #ff3333;
  --hmi-bypass: #ffcc00;
  --hmi-text: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); }

.header {
  background: #1a1a30;
  padding: 16px 24px;
  border-bottom: 2px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size:20px; color:var(--accent); }
.header .subtitle { font-size:12px; color:var(--dim); }
.header .actions { display:flex; gap:8px; }
.btn {
  padding:6px 16px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  border-radius:4px;
  cursor:pointer;
  font-size:12px;
  transition:all 0.2s;
}
.btn:hover { background:var(--accent); color:#fff; }
.btn.primary { background:var(--accent); color:#fff; }

.info-bar {
  background:#1a1a30;
  padding:10px 24px;
  border-bottom:1px solid var(--border);
  font-size:11px;
  color:var(--dim);
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}
.info-bar b { color:var(--text); }

.tabs {
  display:flex;
  background:#1a1a30;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab {
  padding:10px 20px;
  border:none;
  background:transparent;
  color:var(--dim);
  font-size:12px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:all 0.2s;
}
.tab:hover { color:var(--text); background:rgba(91,155,213,0.1); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.content { padding:20px 24px; }

.category { display:none; }
.category.active { display:block; }
.category h2 { font-size:16px; color:var(--accent); margin-bottom:4px; }
.category .cat-desc { font-size:12px; color:var(--dim); margin-bottom:16px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:16px;
}

.symbol-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  transition:all 0.2s;
  cursor:pointer;
}
.symbol-card:hover {
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(91,155,213,0.2);
}
.symbol-preview {
  background:#707070;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  min-height:120px;
}
.symbol-preview svg { max-width:100%; max-height:100px; }
.symbol-info { padding:10px 12px; }
.symbol-name { font-size:13px; font-weight:600; color:var(--text); }
.symbol-tag { font-size:10px; color:var(--dim); margin-top:2px; }
.symbol-states {
  display:flex;
  gap:4px;
  margin-top:6px;
  flex-wrap:wrap;
}
.state-badge {
  font-size:9px;
  padding:1px 6px;
  border-radius:8px;
  border:1px solid;
}
.state-badge.run { color:#00b050; border-color:#00b050; background:rgba(0,176,80,0.1); }
.state-badge.stop { color:#999; border-color:#999; background:rgba(153,153,153,0.1); }
.state-badge.fault { color:#ff3333; border-color:#ff3333; background:rgba(255,51,51,0.1); }
.state-badge.alarm { color:#ffcc00; border-color:#ffcc00; background:rgba(255,204,0,0.1); }

/* Modal */
.modal-overlay {
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  z-index:1000;
  align-items:center;
  justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  width:90%;
  max-width:700px;
  max-height:90vh;
  overflow-y:auto;
}
.modal-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
}
.modal-header h3 { color:var(--accent); font-size:16px; }
.modal-close {
  background:none; border:none; color:var(--dim);
  font-size:20px; cursor:pointer;
}
.modal-body { padding:20px; }
.modal-preview {
  background:#707070;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  margin-bottom:16px;
  gap:20px;
  flex-wrap:wrap;
}
.modal-preview svg { max-height:80px; }
.modal-preview .state-label {
  text-align:center;
  font-size:10px;
  color:#ddd;
  margin-top:4px;
}
.svg-code {
  background:#1a1a2e;
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px;
  font-family:'Courier New',monospace;
  font-size:11px;
  color:#8be9fd;
  overflow-x:auto;
  white-space:pre;
  max-height:200px;
  overflow-y:auto;
  position:relative;
}
.copy-btn {
  position:absolute;
  top:6px;right:6px;
  padding:3px 10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:3px;
  font-size:10px;
  cursor:pointer;
}

.guidelines {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px;
  margin-bottom:16px;
}
.guidelines h3 { color:var(--accent); font-size:14px; margin-bottom:10px; }
.guidelines ul { padding-left:18px; }
.guidelines li { font-size:12px; margin-bottom:6px; color:var(--text); line-height:1.5; }
.guidelines code {
  background:rgba(91,155,213,0.15);
  padding:1px 4px;
  border-radius:3px;
  font-size:11px;
  color:var(--accent);
}

.color-palette {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:8px;
  margin-top:12px;
}
.color-swatch {
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  background:rgba(0,0,0,0.2);
  border-radius:4px;
}
.swatch-box {
  width:24px; height:24px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,0.2);
  flex-shrink:0;
}
.swatch-info { font-size:11px; }
.swatch-info .hex { color:var(--accent); font-family:'Courier New'; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏭 HP-HMI SVG Symbol Library</h1>
    <div class="subtitle">ISA-101 / ASM Consortium — Библиотека символов для промышленных мнемосхем</div>
  </div>
  <div class="actions">
    <button class="btn" onclick="downloadAll()">📦 Скачать все SVG</button>
    <button class="btn primary" onclick="showTab('guidelines')">📖 Руководство</button>
  </div>
</div>

<div class="info-bar">

<div class="tabs" id="tabs"></div>
<div class="content" id="content"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

          alarm: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 100">

      },
      {
        id: 'status-indicator',
        name: 'Индикатор статуса',
        tag: '',
        desc: 'Компактный индикатор состояния оборудования.',
        states: ['ok','warn','alarm','off'],
        svg: {
          ok: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="#00b050" stroke="#008040" stroke-width="1"/></svg>`,

// ============================================================
//  RENDERING
// ============================================================
let totalSymbols = 0;

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = CATEGORIES.map((c, i) => `
    <button class="tab ${i===0?'active':''}" onclick="showTab('${c.id}')">${c.name}</button>
  `).join('');
}

function buildContent() {
  const contentEl = document.getElementById('content');
  let html = '';

  // Guidelines tab
  html += `<div class="category ${CATEGORIES[0].id === 'guidelines' ? 'active' : ''}" id="cat-guidelines">
    <div class="guidelines">
      <h3>🎨 Цветовая палитра HP-HMI (ISA-101)</h3>
      <p style="font-size:12px;color:var(--dim);margin-bottom:12px;">
        Цвет в HP-HMI используется <b style="color:var(--text)">только для передачи статуса</b>. Нормальное состояние — серые тона. Цвет привлекает внимание к отклонениям.
      </p>
      <div class="color-palette">
        <div class="color-swatch"><div class="swatch-box" style="background:#707070"></div><div class="swatch-info">Фон мнемосхемы<br><span class="hex">#707070</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#888888"></div><div class="swatch-info">Тело оборудования<br><span class="hex">#888888</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#b0b0b0"></div><div class="swatch-info">Контур / обводка<br><span class="hex">#B0B0B0</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#999999"></div><div class="swatch-info">Трубопроводы<br><span class="hex">#999999</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#e0e0e0"></div><div class="swatch-info">Текст / метки<br><span class="hex">#E0E0E0</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#808080"></div><div class="swatch-info">Остановлено (Stopped)<br><span class="hex">#808080</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#00b050"></div><div class="swatch-info">В работе (Running)<br><span class="hex">#00B050</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#ffcc00"></div><div class="swatch-info">Предупреждение (H / L)<br><span class="hex">#FFCC00</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#ff3333"></div><div class="swatch-info">Авария (HH / LL / Fault)<br><span class="hex">#FF3333</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#ff9100"></div><div class="swatch-info">Ручной режим (MAN)<br><span class="hex">#FF9100</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#5b9bd5"></div><div class="swatch-info">Информация / уставка<br><span class="hex">#5B9BD5</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#8bc34a"></div><div class="swatch-info">Нефть (поток)<br><span class="hex">#8BC34A</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#ffc107"></div><div class="swatch-info">Газ (поток)<br><span class="hex">#FFC107</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#2196f3"></div><div class="swatch-info">Вода (поток)<br><span class="hex">#2196F3</span></div></div>
        <div class="color-swatch"><div class="swatch-box" style="background:#ff5722"></div><div class="swatch-info">Пар (поток)<br><span class="hex">#FF5722</span></div></div>
      </div>
    </div>

    <div class="guidelines">
      <h3>📐 Принципы построения HP-HMI мнемосхем</h3>
      <ul>
        <li><b>Серый = нормально.</b> Оборудование в нормальном состоянии всегда серое. Цвет появляется ТОЛЬКО при отклонении или для индикации статуса работы.</li>
        <li><b>Никаких 3D-эффектов, градиентов, теней.</b> Плоские символы, чистые линии. Минимум деталей — максимум читаемости.</li>
        <li><b>Уровень детализации = уровень мнемосхемы.</b> L1 — только карточки и KPI. L2 — упрощённая схема. L3 — детальные параметры. L4 — тренды и диагностика.</li>
        <li><b>Консистентность.</b> Одинаковые символы для одинакового оборудования по всему проекту. Не изобретать новые обозначения.</li>
        <li><b>Контраст текста.</b> Текст всегда читаем на сером фоне: <code>#E0E0E0</code> для основного, <code>#AAAAAA</code> для вторичного.</li>
        <li><b>Размер шрифтов.</b> Минимум 10px для DPI стандартного монитора оператора. Теги — жирные, значения — моноширинный шрифт.</li>
        <li><b>Анимация.</b> Только для индикации работающего оборудования (пульсация насоса, вращение). Никаких декоративных анимаций.</li>
        <li><b>Направление потока.</b> Слева направо или сверху вниз. Стрелки на трубопроводах при необходимости.</li>
      </ul>
    </div>

    <div class="guidelines">
      <h3>📋 Минимальный набор элементов для УПН</h3>
      <ul>
        <li><b>Насосы (4):</b> центробежный, поршневой, дозировочный, погружной (ЭЦН)</li>
        <li><b>Арматура (6):</b> задвижка, регулирующий клапан, обратный, предохранительный (PSV), отсечной (ESD), трёхходовой</li>
        <li><b>Ёмкости (5):</b> горизонтальный сепаратор, вертикальная ёмкость, резервуар (РВС), колонна, трёхфазный сепаратор</li>
        <li><b>Теплообмен (4):</b> кожухотрубный ТО, печь, АВО, конденсатор</li>
        <li><b>Приборы (4):</b> полевой датчик, функция DCS, функция SIS, мини-фейсплейт</li>
        <li><b>Электрооборудование (3):</b> двигатель, ЧРП (VFD), электродегидратор</li>
        <li><b>Трубопроводы (6):</b> нефть, газ, вода, пар, нейтральный, тройник</li>
        <li><b>Прочее (5):</b> фильтр, компрессор, факел, вентилятор, статический смеситель</li>
        <li><b>Индикаторы (3):</b> баргаф с уставками, индикатор статуса, аларм-баннер</li>
        <li style="margin-top:8px;color:var(--accent)"><b>Итого: 40 символов × множество состояний = полный комплект для проекта УПН</b></li>
      </ul>
    </div>
  </div>`;

  // Category tabs
  CATEGORIES.forEach(cat => {
    if (cat.isGuide) return;
    const symbols = cat.symbols || [];
    totalSymbols += symbols.length;

    html += `<div class="category" id="cat-${cat.id}">
      <h2>${cat.name}</h2>
      <div class="cat-desc">${cat.desc} — ${symbols.length} символов</div>
      <div class="grid">
        ${symbols.map(s => {
          const firstState = Object.keys(s.svg)[0];
          return `
            <div class="symbol-card" onclick="openModal('${cat.id}','${s.id}')">
              <div class="symbol-preview">${s.svg[firstState]}</div>
              <div class="symbol-info">
                <div class="symbol-name">${s.name}</div>
                <div class="symbol-tag">${s.tag || '—'}</div>
                <div class="symbol-states">
                  ${s.states.map(st => {
                    const cls = st === 'run' || st === 'running' || st === 'burning' || st === 'auto' ? 'run' :
                                st === 'fault' || st === 'trip' || st === 'alarm' || st === 'hihi' ? 'fault' :
                                st === 'warn' || st === 'dirty' || st === 'bypass' || st === 'man' || st === 'hi' || st === 'open' ? 'alarm' : 'stop';
                    return `<span class="state-badge ${cls}">${st}</span>`;
                  }).join('')}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
  });

  contentEl.innerHTML = html;
  document.getElementById('total-count').textContent = totalSymbols;
}

function showTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
  const idx = CATEGORIES.findIndex(c => c.id === id);
  if (idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('active');
  const cat = document.getElementById('cat-' + id);
  if (cat) cat.classList.add('active');
}

function openModal(catId, symId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const sym = cat.symbols.find(s => s.id === symId);
  if (!sym) return;

  document.getElementById('modal-title').textContent = sym.name;

  let html = `<p style="font-size:12px;color:var(--dim);margin-bottom:12px;">${sym.desc}</p>`;
  if (sym.tag) html += `<p style="font-size:11px;margin-bottom:12px;">Тег: <code style="color:var(--accent)">${sym.tag}</code></p>`;

  html += `<div class="modal-preview">`;
  Object.entries(sym.svg).forEach(([state, svg]) => {
    html += `<div><div>${svg}</div><div class="state-label">${state.toUpperCase()}</div></div>`;
  });
  html += `</div>`;

  // SVG code for each state
  Object.entries(sym.svg).forEach(([state, svg]) => {
    const escaped = svg.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    html += `
      <p style="font-size:11px;color:var(--dim);margin:8px 0 4px;">SVG код — <b style="color:var(--text)">${state}</b>:</p>
      <div class="svg-code" style="position:relative">
        <button class="copy-btn" onclick="copySVG(this, '${sym.id}', '${state}')">Копировать</button>
        ${escaped}
      </div>
    `;
  });

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function copySVG(btn, symId, state) {
  let svg = '';
  CATEGORIES.forEach(cat => {
    if (!cat.symbols) return;
    const sym = cat.symbols.find(s => s.id === symId);
    if (sym && sym.svg[state]) svg = sym.svg[state];
  });
  navigator.clipboard.writeText(svg.trim()).then(() => {
    btn.textContent = '✓ Скопировано';
    setTimeout(() => btn.textContent = 'Копировать', 1500);
  });
}

function downloadAll() {
  // Generate a combined SVG with all symbols as <defs>
  let allSvgs = '<!-- HP-HMI SVG Symbol Library -->\n<!-- ISA-101 / ASM Consortium Standard -->\n<!-- Generated: ' + new Date().toISOString() + ' -->\n\n';

  CATEGORIES.forEach(cat => {
    if (!cat.symbols) return;
    allSvgs += `\n<!-- ======== ${cat.name} ======== -->\n`;
    cat.symbols.forEach(sym => {
      Object.entries(sym.svg).forEach(([state, svg]) => {
        allSvgs += `\n<!-- ${sym.name} — ${state} (${sym.id}-${state}) -->\n`;
        allSvgs += svg.trim().replace('<svg ', `<svg id="${sym.id}-${state}" `) + '\n';
      });
    });
  });

  const blob = new Blob([allSvgs], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hphmi-symbols-library.svg';
  a.click();
}

// Init
buildTabs();
buildContent();

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
