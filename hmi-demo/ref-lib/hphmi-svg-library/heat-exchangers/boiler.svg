<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 90" width="80" height="90">
  <title>Boiler</title>
  <!-- Shell -->
  <path d="M10,20 Q10,8 40,8 Q70,8 70,20 L70,70 Q70,82 40,82 Q10,82 10,70 Z" fill="none" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Fire box -->
  <rect x="20" y="60" width="40" height="15" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Flame -->
  <path d="M38,72 Q40,64 42,72" fill="none" stroke="#4a4a4a" stroke-width="1"/>
  <!-- Stack -->
  <rect x="32" y="0" width="16" height="10" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Nozzles -->
  <line x1="0" y1="40" x2="10" y2="40" stroke="#4a4a4a" stroke-width="2"/>
  <line x1="70" y1="25" x2="80" y2="25" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Steam out -->
  <line x1="40" y1="0" x2="40" y2="8" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Fuel in -->
  <line x1="40" y1="82" x2="40" y2="90" stroke="#4a4a4a" stroke-width="2"/>
</svg>
