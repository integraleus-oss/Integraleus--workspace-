<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Symbol Library — АСУ ТП / SCADA</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080c14;
  --bg1:       #0d1524;
  --bg2:       #111e35;
  --surface:   #0f1d30;
  --border:    #1a2e4a;
  --border-hi: #234060;
  --cyan:      #00d4ff;
  --cyan-dim:  rgba(0,212,255,0.12);
  --cyan-glow: rgba(0,212,255,0.35);
  --orange:    #f97316;
  --orange-dim:rgba(249,115,22,0.12);
  --green:     #22d3a0;
  --green-dim: rgba(34,211,160,0.12);
  --red:       #ff4454;
  --yellow:    #fbbf24;
  --text:      #d8e8f8;
  --text2:     #7a9bc0;
  --text3:     #3d5a7a;
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --r:  3px;
  --r2: 6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 47px,rgba(26,46,74,0.15) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,rgba(26,46,74,0.15) 48px);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:48px 32px 100px}

/* Header */
.kit-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px;padding-bottom:28px;border-bottom:1px solid var(--border);position:relative}
.kit-header::after{content:'';position:absolute;bottom:-1px;left:0;width:180px;height:1px;background:var(--cyan);}
.kit-title{font-family:var(--font-ui);font-size:42px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text);line-height:1}
.kit-title span{color:var(--cyan)}
.kit-sub{font-family:var(--font-ui);font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);line-height:1;margin-top:4px}
.kit-meta{font-family:var(--font-mono);font-size:11px;color:var(--text3);text-align:right;line-height:2}

/* Section */
.section{margin-bottom:56px;animation:fadeUp .5s ease both}
.section-label{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.section-label::before{content:'';display:block;width:4px;height:28px;background:var(--cyan);}
.section-label h2{font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--text2)}
.section-label span{font-family:var(--font-mono);font-size:10px;color:var(--text3)}
.sep{border:none;border-top:1px solid var(--border);margin:0 0 56px}

/* Stats bar */
.stats-bar{display:flex;gap:24px;flex-wrap:wrap;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:32px;font-family:var(--font-mono);font-size:11px;color:var(--text3)}
.stats-bar b{color:var(--cyan)}

/* Tabs */
.nav-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:24px}
.nav-tab{padding:8px 18px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--font-ui);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:var(--r)}
.nav-tab:hover{color:var(--text);background:var(--bg2);border-color:var(--border-hi)}
.nav-tab.active{color:var(--cyan);background:var(--cyan-dim);border-color:var(--cyan);}

/* Symbol grid */
.sym-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.cat-panel{display:none}
.cat-panel.active{display:block}
.cat-desc{font-size:13px;color:var(--text3);margin-bottom:20px;font-family:var(--font-body)}

/* Symbol card — matches reference card style */
.sym-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:border-color .25s,box-shadow .25s,transform .2s;cursor:pointer;position:relative}
.sym-card:hover{border-color:var(--border-hi);box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px var(--border-hi);transform:translateY(-2px)}
.sym-card .card-bar{height:3px;background:var(--border)}
.sym-card .card-bar.cyan{background:linear-gradient(90deg,var(--cyan),transparent);}
.sym-card .card-bar.green{background:linear-gradient(90deg,var(--green),transparent)}
.sym-card .card-bar.orange{background:linear-gradient(90deg,var(--orange),transparent)}
.sym-card .card-bar.red{background:linear-gradient(90deg,var(--red),transparent)}

.sym-preview{background:var(--bg1);display:flex;align-items:center;justify-content:center;padding:20px;min-height:110px;position:relative;border-bottom:1px solid var(--border)}
.sym-preview svg{max-width:100%;max-height:80px;}
.sym-preview::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(26,46,74,0.1) 20px),repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(26,46,74,0.1) 20px);pointer-events:none}

.sym-info{padding:12px 14px}
.sym-name{font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text)}
.sym-tag{font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-top:2px}
.sym-states{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}

/* Badges — from reference */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;font-family:var(--font-ui);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:2px;border:1px solid currentColor;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge.st-run{color:var(--green);background:var(--green-dim)}
.badge.st-stop{color:var(--text2);background:rgba(122,155,192,0.1);border-color:var(--border)}
.badge.st-fault{color:var(--red);background:rgba(255,68,84,0.1)}
.badge.st-alarm{color:var(--yellow);background:rgba(251,191,36,0.1)}
.badge.st-open{color:var(--cyan);background:var(--cyan-dim)}
.badge.st-closed{color:var(--text2);background:rgba(122,155,192,0.1);border-color:var(--border)}
.badge.st-man{color:var(--orange);background:var(--orange-dim)}
.badge.st-auto{color:var(--green);background:var(--green-dim)}
.badge.st-trip{color:var(--red);background:rgba(255,68,84,0.1)}
.badge.st-bypass{color:var(--yellow);background:rgba(251,191,36,0.1)}
.badge.st-normal{color:var(--text2);background:rgba(122,155,192,0.1);border-color:var(--border)}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);width:92%;max-width:750px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-header h3{font-family:var(--font-ui);font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
.modal-close{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);cursor:pointer;font-size:16px;transition:all .2s}
.modal-close:hover{color:var(--red);border-color:var(--red)}
.modal-body{padding:22px}
.modal-states{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;padding:24px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:20px;position:relative}
.modal-states::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(26,46,74,0.08) 20px),repeating-linear-gradient(90deg,transparent,transparent 19px,rgba(26,46,74,0.08) 20px);pointer-events:none;border-radius:var(--r2)}
.modal-state-item{text-align:center;position:relative;z-index:1}
.modal-state-item svg{max-height:80px;}
.modal-state-label{font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-top:8px}

.code-block{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);margin-top:12px;overflow:hidden}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.code-label{font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.code-copy{padding:3px 12px;background:var(--cyan);color:var(--bg);border:none;border-radius:var(--r);font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.code-copy:hover{background:#33ddff;}
.code-body{padding:14px;font-family:var(--font-mono);font-size:11px;color:var(--cyan);overflow-x:auto;white-space:pre;max-height:180px;overflow-y:auto;line-height:1.6}

.modal-desc{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-tag-row{display:flex;gap:8px;align-items:center;margin-bottom:16px}
.modal-tag-label{font-family:var(--font-ui);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.modal-tag-val{font-family:var(--font-mono);font-size:12px;color:var(--cyan)}

/* Color palette in guidelines */
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.pal-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);transition:border-color .2s}
.pal-item:hover{border-color:var(--border-hi)}
.pal-swatch{width:32px;height:32px;border-radius:var(--r);border:1px solid rgba(255,255,255,0.06);flex-shrink:0;position:relative;overflow:hidden}
.pal-swatch::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,transparent 60%)}
.pal-info{display:flex;flex-direction:column}
.pal-name{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text2)}
.pal-hex{font-family:var(--font-mono);font-size:10px;color:var(--cyan)}

/* Guidelines box */
.guide-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:22px;margin-bottom:20px}
.guide-box h3{font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px}
.guide-box ul{padding-left:18px}
.guide-box li{font-size:13px;margin-bottom:8px;color:var(--text);line-height:1.6}
.guide-box li b{color:var(--cyan)}
.guide-box code{background:var(--cyan-dim);padding:1px 6px;border-radius:2px;font-family:var(--font-mono);font-size:11px;color:var(--cyan)}

/* Download btn */
.dl-bar{display:flex;gap:10px;margin-bottom:28px}
.btn-dl{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;font-family:var(--font-ui);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;border-radius:var(--r)}
.btn-dl.primary{background:var(--cyan);color:var(--bg);}
.btn-dl.primary:hover{background:#33ddff;transform:translateY(-1px)}
.btn-dl.ghost{background:transparent;color:var(--cyan);border:1px solid var(--cyan);}
.btn-dl.ghost:hover{background:var(--cyan-dim);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes blink-r{0%,100%{opacity:1}50%{opacity:0.2}}

@media(max-width:700px){
  .sym-grid{grid-template-columns:1fr}
  .kit-header{flex-direction:column;gap:12px}
  .palette-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="page">

<div class="kit-header">
  <div>
    <div class="kit-title">SVG <span>SYMBOLS</span></div>
    <div class="kit-sub">АСУ ТП / Мнемосхемы</div>
  </div>
  <div class="kit-meta">
    v2.0.0 · 2026<br>
    ISA-101 / HP-HMI Standard<br>
    Dark Industrial Theme
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>
<div class="dl-bar">
  <button class="btn-dl primary" onclick="downloadAll()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="7,10 12,15 17,10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    Скачать все SVG
  </button>
  <button class="btn-dl ghost" onclick="showCat('guide')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" stroke="currentColor" stroke-width="1.5"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" stroke="currentColor" stroke-width="1.5"/></svg>
    Руководство
  </button>
</div>
<div class="nav-tabs" id="nav-tabs"></div>
<div id="panels"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">—</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  SVG SYMBOL DEFINITIONS
//  Color scheme matches the SCADA UI Kit:
//   Equipment body: stroke #234060, fill #0f1d30
//   Running/active: #22d3a0 (green)
//   Stopped/idle: #3d5a7a (dim)
//   Fault: #ff4454 (red)
//   Alarm: #fbbf24 (yellow)
//   Bypass/Manual: #f97316 (orange)
//   Pipes: #1a2e4a stroke, colored by medium
//   Accents: #00d4ff (cyan)
//   Text on symbols: #d8e8f8 / #7a9bc0
// ═══════════════════════════════════════════════════

const C = {
  body:'#0f1d30', stroke:'#234060', strokeHi:'#00d4ff',
  run:'#22d3a0', stop:'#3d5a7a', fault:'#ff4454', alarm:'#fbbf24', bypass:'#f97316',
  text:'#d8e8f8', dim:'#7a9bc0', dark:'#3d5a7a',
  pipe:'#1a2e4a', cyan:'#00d4ff', cyanDim:'rgba(0,212,255,0.2)',
  oil:'#22d3a0', gas:'#fbbf24', water:'#00d4ff', steam:'#f97316'
};

const CATS = [
  {
    id:'guide', name:'📖 Руководство', desc:'Дизайн-токены, палитра и принципы HP-HMI', isGuide:true
  },
  {
    id:'pumps', name:'Насосы', desc:'Центробежные, поршневые, дозировочные, погружные — 4 типа',
    bar:'cyan',
    symbols:[
      {
        id:'pump-centrifugal', name:'Насос центробежный', tag:'P-XXX',
        desc:'Стандартный центробежный насос. Основной элемент любой технологической схемы.',
        states:['stop','run','fault'],
        svg:{
          stop:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <circle cx="40" cy="38" r="26" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <polygon points="40,16 66,38 40,60" fill="none" stroke="${C.stop}" stroke-width="2" stroke-linejoin="round"/>
  <line x1="66" y1="38" x2="95" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="38" x2="14" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <text x="40" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.stop}">STOPPED</text>
</svg>`,
          run:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <circle cx="40" cy="38" r="26" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <circle cx="40" cy="38" r="26" fill="none" stroke="${C.run}" stroke-width="1" opacity="0.3"/>
  <polygon points="40,16 66,38 40,60" fill="${C.run}" fill-opacity="0.15" stroke="${C.run}" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="40" cy="38" r="4" fill="${C.run}" opacity="0.8"/>
  <line x1="66" y1="38" x2="95" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="38" x2="14" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <text x="40" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.run}">RUNNING</text>
</svg>`,
          fault:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">
  <circle cx="40" cy="38" r="26" fill="${C.body}" stroke="${C.fault}" stroke-width="2.5"/>
  <polygon points="40,16 66,38 40,60" fill="${C.fault}" fill-opacity="0.15" stroke="${C.fault}" stroke-width="2" stroke-linejoin="round"/>
  <line x1="32" y1="30" x2="48" y2="46" stroke="${C.fault}" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="30" x2="32" y2="46" stroke="${C.fault}" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="38" x2="95" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <line x1="5" y1="38" x2="14" y2="38" stroke="${C.pipe}" stroke-width="4" stroke-linecap="round"/>
  <text x="40" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.fault}">FAULT</text>
</svg>`
        }
      },
      {
        id:'pump-positive', name:'Насос поршневой', tag:'P-XXX',
        desc:'Поршневой/плунжерный насос для перекачки вязких сред.',
        states:['stop','run','fault'],
        svg:{
          stop:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80">
  <circle cx="36" cy="38" r="24" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <rect x="60" y="20" width="34" height="36" rx="3" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <line x1="77" y1="20" x2="77" y2="56" stroke="${C.stop}" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="5" y1="38" x2="12" y2="38" stroke="${C.pipe}" stroke-width="4"/>
  <text x="55" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.stop}">STOPPED</text>
</svg>`,
          run:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80">
  <circle cx="36" cy="38" r="24" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <circle cx="36" cy="38" r="5" fill="${C.run}" opacity="0.7"/>
  <rect x="60" y="20" width="34" height="36" rx="3" fill="${C.body}" stroke="${C.stroke}" stroke-width="2"/>
  <line x1="77" y1="20" x2="77" y2="56" stroke="${C.run}" stroke-width="2"/>
  <line x1="5" y1="38" x2="12" y2="38" stroke="${C.pipe}" stroke-width="4"/>
  <text x="55" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.run}">RUNNING</text>
</svg>`,
          fault:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 80">
  <circle cx="36" cy="38" r="24" fill="${C.body}" stroke="${C.fault}" stroke-width="2.5"/>
  <circle cx="36" cy="38" r="5" fill="${C.fault}"/>
  <rect x="60" y="20" width="34" height="36" rx="3" fill="${C.body}" stroke="${C.fault}" stroke-width="2.5"/>
  <line x1="5" y1="38" x2="12" y2="38" stroke="${C.pipe}" stroke-width="4"/>
  <text x="55" y="74" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-size="9" font-weight="700" letter-spacing="2" fill="${C.fault}">FAULT</text>
</svg>`
        }
      },
      {
        id:'pump-dosing', name:'Насос дозировочный', tag:'P-XXX',
        desc:'Мембранный/плунжерный дозировочный насос для реагентов.',
        states:['stop','run'],
        svg:{

// ═══════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════
let totalSymbols = 0;

function init() {
  CATS.forEach(c => { if(c.symbols) totalSymbols += c.symbols.length; });
  document.getElementById('stats-bar').innerHTML = `
    <span>Символов: <b>${totalSymbols}</b></span>
    <span>Категорий: <b>${CATS.length - 1}</b></span>
    <span>Палитра: <b>Dark Industrial (SCADA UI Kit)</b></span>
    <span>Формат: <b>SVG inline</b></span>
    <span>Стандарт: <b>ISA-101 / HP-HMI</b></span>
  `;

  // Tabs
  document.getElementById('nav-tabs').innerHTML = CATS.map(c =>
    `<button class="nav-tab" data-id="${c.id}" onclick="showCat('${c.id}')">${c.name}</button>`
  ).join('');

  // Panels
  let html = '';

  // Guide panel
  html += `<div class="cat-panel" data-id="guide" id="panel-guide">
    <div class="guide-box">
      <h3>🎨 Цветовые токены дизайн-системы</h3>
      <div class="palette-grid">
        ${[
          ['--bg','Фон','#080C14'],['--bg1','Фон панели','#0D1524'],['--surface','Поверхность','#0F1D30'],
          ['--border','Граница','#1A2E4A'],['--border-hi','Граница hover','#234060'],
          ['--cyan','Акцент / Cyan','#00D4FF'],['--green','В работе','#22D3A0'],['--red','Авария / Fault','#FF4454'],
          ['--yellow','Предупреждение','#FBBF24'],['--orange','Ручной / Bypass','#F97316'],
          ['--text','Основной текст','#D8E8F8'],['--text2','Вторичный','#7A9BC0'],['--text3','Приглушённый','#3D5A7A'],
          ['Нефть','Поток нефти','#22D3A0'],['Газ','Поток газа','#FBBF24'],['Вода','Поток воды','#00D4FF'],['Пар','Поток пара','#F97316']
        ].map(([name,desc,hex]) => `
          <div class="pal-item">
            <div class="pal-swatch" style="background:${hex}"></div>
            <div class="pal-info"><span class="pal-name">${desc}</span><span class="pal-hex">${hex}</span></div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="guide-box">
      <h3>📐 Принципы построения</h3>
      <ul>
        <li><b>Тёмный фон + минимальный цвет.</b> Оборудование fill=<code>#0F1D30</code>, stroke=<code>#234060</code>. Цвет только для статуса.</li>
        <li><b>Шрифты:</b> <code>Barlow Condensed 700</code> для меток и заголовков, <code>Share Tech Mono</code> для значений и тегов.</li>
        <li><b>Stroke-based иконки.</b> Никаких заливок для декора. Без glow-эффектов. Статус только через цвет обводки и заливки.</li>
        <li><b>Статус через обводку.</b> Normal = <code>#234060</code>. Alarm = <code>#FBBF24</code>. Fault = <code>#FF4454</code>. Running = внутренний элемент <code>#22D3A0</code>.</li>
        <li><b>Консистентность.</b> Все символы используют единую палитру и стили текста.</li>
        <li><b>Никаких градиентов и 3D.</b> Плоский дизайн, чистые линии, сетка на фоне.</li>
      </ul>
    </div>
    <div class="guide-box">
      <h3>📋 Состав библиотеки (${totalSymbols} символов)</h3>
      <ul>
        ${CATS.filter(c=>!c.isGuide).map(c => `<li><b>${c.name} (${c.symbols.length}):</b> ${c.symbols.map(s=>s.name).join(', ')}</li>`).join('')}
      </ul>
    </div>
  </div>`;

  // Category panels
  CATS.filter(c=>!c.isGuide).forEach(c => {
    html += `<div class="cat-panel" data-id="${c.id}">
      <div class="cat-desc">${c.desc}</div>
      <div class="sym-grid">
        ${c.symbols.map(s => {
          const first = Object.keys(s.svg)[0];
          const barClass = c.bar || 'cyan';
          return `
            <div class="sym-card" onclick="openModal('${c.id}','${s.id}')">
              <div class="card-bar ${barClass}"></div>
              <div class="sym-preview">${s.svg[first]}</div>
              <div class="sym-info">
                <div class="sym-name">${s.name}</div>
                <div class="sym-tag">${s.tag}</div>
                <div class="sym-states">
                  ${s.states.map(st => {
                    let cls = 'st-normal';
                    if(['run','running','burning','auto'].includes(st)) cls='st-run';
                    else if(['fault','trip'].includes(st)) cls='st-fault';
                    else if(['alarm','dirty','hihi'].includes(st)) cls='st-alarm';
                    else if(['open'].includes(st)) cls='st-open';
                    else if(['closed'].includes(st)) cls='st-closed';
                    else if(['man','bypass'].includes(st)) cls='st-man';
                    else if(['stop','off','idle'].includes(st)) cls='st-stop';
                    return `<span class="badge ${cls}"><span class="badge-dot"></span>${st}</span>`;
                  }).join('')}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
  });

  document.getElementById('panels').innerHTML = html;
  showCat(CATS[1].id); // Show first real category
}

function showCat(id) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('.cat-panel').forEach(p => p.classList.toggle('active', p.dataset.id === id));
}

function openModal(catId, symId) {
  const cat = CATS.find(c => c.id === catId);
  const sym = cat.symbols.find(s => s.id === symId);
  if (!sym) return;
  document.getElementById('modal-title').textContent = sym.name;

  let html = `<div class="modal-desc">${sym.desc}</div>`;
  if (sym.tag && sym.tag !== '—') html += `<div class="modal-tag-row"><span class="modal-tag-label">Тег:</span><span class="modal-tag-val">${sym.tag}</span></div>`;

  html += `<div class="modal-states">`;
  Object.entries(sym.svg).forEach(([st, svg]) => {
    html += `<div class="modal-state-item"><div>${svg}</div><div class="modal-state-label">${st}</div></div>`;
  });
  html += `</div>`;

  Object.entries(sym.svg).forEach(([st, svg]) => {
    const escaped = svg.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `<div class="code-block"><div class="code-header"><span class="code-label">${st}</span><button class="code-copy" onclick="copySVG(this,'${sym.id}','${st}')">Копировать</button></div><div class="code-body">${escaped}</div></div>`;
  });

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function copySVG(btn, symId, state) {
  let svg = '';
  CATS.forEach(c => { if(!c.symbols) return; const s=c.symbols.find(x=>x.id===symId); if(s&&s.svg[state]) svg=s.svg[state]; });
  navigator.clipboard.writeText(svg.trim()).then(() => { btn.textContent='✓ OK'; setTimeout(()=>btn.textContent='Копировать',1500); });
}

function downloadAll() {
  let out = `<!-- SVG Symbol Library — АСУ ТП / SCADA -->\n<!-- Dark Industrial Theme · ${new Date().toISOString()} -->\n`;
  CATS.forEach(c => {
    if(!c.symbols) return;
    out += `\n<!-- ══════ ${c.name.toUpperCase()} ══════ -->\n`;
    c.symbols.forEach(s => {
      Object.entries(s.svg).forEach(([st,svg]) => {
        out += `\n<!-- ${s.name} · ${st} -->\n${svg.trim().replace('<svg ','<svg id="'+s.id+'-'+st+'" ')}\n`;
      });
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out],{type:'image/svg+xml'}));
  a.download = 'scada-svg-symbols.svg';
  a.click();
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
init();
</script>
