title: "Переход с AVEVA PI System\nна Альфа платформу"
subtitle: "От зависимости — к контролю. Стратегия для IT."
company: "АО «Атомик Софт»"
presenter: "Станислав Павловский"
presenter_contact: "Telegram: @Integraleus"
confidential: true

slides:
  - type: title

  - type: cards
    title: "Ситуация: почему нужно действовать сейчас"
    cards:
      - icon: "shield-lock.png"
        heading: "Санкционный риск"
        accent: "#CC3333"
        body: "AVEVA прекратила поддержку\nи продажу в РФ.\nНет обновлений. Нет патчей\nбезопасности. Нет техподдержки."
      - icon: "chart-line.png"
        heading: "Финансовый риск"
        accent: "#E89C00"
        body: "AVEVA Flex: ~$108K/год\nза подписку.\nПри неоплате — ПО\nперестаёт работать.\nВалютный риск."
      - icon: "lock.png"
        heading: "Регуляторный риск"
        accent: "#005497"
        body: "ФЗ-187 о КИИ требует\nперехода на отечественное ПО.\nСроки ужесточаются.\nФСТЭК-аудиты."
    bottom_line: "⏱ Каждый месяц без действий — это $9K подписки + растущий риск деактивации"
    bottom_color: "#CC3333"

  - type: metrics
    title: "Решение: Альфа платформа"
    subtitle: "Российская SCADA-платформа №1 в реестре Минцифры\nот АО «Атомик Софт» (Томск)"
    metrics:
      - icon: "building-factory.png"
        value: "6500+"
        label: "инсталляций\nв промышленности"
      - icon: "network.png"
        value: "80+"
        label: "партнёров-\nинтеграторов"
      - icon: "code.png"
        value: "140+"
        label: "сотрудников\nразработки"
      - icon: "clock.png"
        value: "10 лет"
        label: "на рынке\nАСУ ТП"
    bullets:
      - icon: "shield-check.png"
        text: "Реестр Минцифры — полное соответствие ФЗ-187 о КИИ"
      - icon: "key.png"
        text: "Бессрочная лицензия в рублях — предсказуемый бюджет"
      - icon: "server.png"
        text: "Windows + Linux (Astra, РЕД ОС) — сертифицированные ОС"
      - icon: "shield-lock.png"
        text: "Лицензия ФСТЭК на разработку СЗКИ"
      - icon: "settings.png"
        text: "Техподдержка 24/7 на русском языке, вендор в России"

  - type: contrast
    title: "Что меняется: суть перехода"
    left:
      accent: "#999999"
      icon: "database.png"
      heading: "AVEVA PI System"
      subtitle: "«Склад данных»"
      body: "Собирает данные и раздаёт —\nаналитикам, Excel, облаку, BI.\nУправление процессом — не его задача.\nПодписка в долларах. Облако за рубежом."
    right:
      accent: "#005497"
      icon: "layout-dashboard.png"
      heading: "Альфа платформа"
      subtitle: "«Диспетчерская с пультом»"
      body: "Оператор видит и управляет процессом.\nХранение данных тоже есть (Historian).\nНо главное — пульт управления.\nБессрочная лицензия в рублях. On-prem."
    bottom_title: "Что это значит для бизнеса:"
    bottom_points:
      - "Переход с «хранилища данных» на «систему управления с хранилищем» — функционал расширяется"
      - "Некоторые «курьерские сервисы» (REST API, облако, Event Frames) потребуют доработки"
      - "Основные функции (архив, визуализация, тревоги, протоколы) заменяются полностью"

  - type: columns
    title: "Покрытие функционала"
    columns:
      - accent: "#82C444"
        heading: "✅ Полная замена"
        items:
          - "Архив данных"
          - "Экраны оператора"
          - "Тревоги и события"
          - "Буферизация"
          - "Администрирование"
          - "Программный доступ"
      - accent: "#E89C00"
        heading: "⚠️ Частичная"
        items:
          - "Коннекторы (450→30,\nно 80% покрыто)"
          - "Self-service дашборды\n(есть, но проще)"
          - "Модель активов\n(не «на лету»)"
          - "Excel-отчёты\n(другой формат)"
      - accent: "#CC3333"
        heading: "❌ Требует доработки"
        items:
          - "Запись событий\n(Event Frames)"
          - "HTTP-доступ (REST API)"
          - "Синхронизация серверов"
          - "BI-интеграция\n(через SQL обход)"

  - type: timeline
    title: "План перехода: сроки и ресурсы"
    phases:
      - name: "АУДИТ"
        duration: "1–2 мес."
        icon: "eye.png"
        color: "#CC3333"
        description: "Инвентаризация тегов,\nпротоколов, скриптов"
      - name: "ПРОЕКТ"
        duration: "1 мес."
        icon: "chart-infographic.png"
        color: "#E89C00"
        description: "Архитектура, лицензии,\nбюджет, рабочая группа"
      - name: "ПИЛОТ"
        duration: "2–3 мес."
        icon: "activity.png"
        color: "#005497"
        description: "Один объект —\nпроверка на практике"
      - name: "МИГРАЦИЯ"
        duration: "3–6 мес."
        icon: "database-import.png"
        color: "#3375AD"
        description: "Объекты переводим\nпараллельно с PI"
      - name: "СДАЧА"
        duration: "1–2 мес."
        icon: "shield-check.png"
        color: "#82C444"
        description: "Отключаем PI.\nДокументация. SLA."
    summary: "Общая длительность: 8–14 месяцев.  Нулевой простой — PI и Альфа работают параллельно."

  - type: table
    title: "Сравнение: ключевые параметры"
    headers: ["Параметр", "PI System", "Альфа платформа"]
    rows:
      - ["Лицензия", "~$108K/год, подписка", "Разовая покупка, рубли"]
      - ["ОС", "Только Windows", "Windows + Linux (Astra, РЕД ОС)"]
      - ["Реестр Минцифры", "Нет", "Да — соответствие ФЗ-187"]
      - ["Поддержка в РФ", "Нет (санкции)", "24/7 на русском, вендор в Томске"]
      - ["Визуализация", "PI Vision — простая", "Alpha.HMI 2.0 — мощная"]
      - ["Коннекторы", "450+ протоколов", "~30 + OPC UA шлюзы (~80%)"]
      - ["Облако", "AVEVA Data Hub", "Нет (on-prem = безопаснее)"]
      - ["Event Frames", "Есть", "Нет (доработка если нужно)"]
      - ["REST API", "Есть", "Нет (доступ через TCP/SQL)"]
      - ["ФСТЭК", "Нет", "Лицензия на разработку СЗКИ"]

  - type: cta
    title: "Запрос на решение"
    intro: "Предлагаем утвердить:"
    actions:
      - icon: "eye.png"
        heading: "Запуск аудита PI-инфраструктуры"
        body: "Инвентаризация: теги, протоколы, скрипты, отчёты, Event Frames.\nСрок: 1–2 месяца. Результат: отчёт с рекомендациями."
      - icon: "building-factory.png"
        heading: "Определение пилотного объекта"
        body: "Один объект для проверки на практике.\nPI и Альфа работают параллельно 2–4 недели."
      - icon: "network.png"
        heading: "Формирование рабочей группы"
        body: "НОВАТЭК (КИПиА + IT) + Атомик Софт + интегратор.\nЕженедельные статус-встречи."
      - icon: "chart-bar.png"
        heading: "Бюджет и контур пилота"
        body: "Согласование бюджета по итогам аудита.\nЛицензии + работы определяются на этапе 1."

  - type: closing
